name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check OpenAPI
        run: pnpm run check:openapi

      - name: Check generated types
        run: pnpm run check:types

      - name: Check Go fmt
        run: pnpm run check:go-fmt

      - name: Lint Go
        run: pnpm run lint:go

      - name: Go test
        run: go test -tags noui ./...

      - name: Build web UI
        run: |
          cd packages/web && pnpm build
          cd ../..

      - name: Go build (with embedded SPA)
        run: go build ./cmd/spawntreed/

      - name: Build packages
        run: pnpm build

      - name: Lint
        run: pnpm exec oxlint .

      - name: Test
        run: pnpm test

      - name: CLI smoke test
        run: node packages/cli/dist/index.js --help
