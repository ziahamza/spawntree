name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.6.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Check OpenAPI
        run: pnpm run check:openapi

      - name: Check generated types
        run: pnpm run check:types

      - name: Check Go fmt
        run: pnpm run check:go-fmt

      - name: Lint Go
        run: pnpm run lint:go

      - name: Go test
        run: go test -tags noui ./...

      - name: Build web UI
        run: cd packages/web && pnpm build

      - name: Go build (with embedded SPA)
        run: go build ./cmd/spawntreed/

      - name: Build packages
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # Expires Jul 2, 2026 — rotate before then
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
