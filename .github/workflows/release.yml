name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run auto-changeset + changeset status without publishing"
        type: boolean
        default: true

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip-release]') }}
    permissions:
      contents: write
      pull-requests: write
      # Enables npm OIDC trusted publishing: `id-token: write` lets the job
      # mint a short-lived GitHub-issued token that npm verifies against the
      # package's trusted-publisher config. Publishing with `--provenance`
      # embeds attestations so consumers can verify the package came from
      # this repo / workflow. See docs/RELEASE.md for the per-package npm
      # setup (required only once per package).
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # RELEASE_PUSH_TOKEN (a PAT) is REQUIRED if `main` has branch protection:
          # the fallback GITHUB_TOKEN cannot push past a protected branch, which would
          # fail the run AFTER publishing to npm (a painful partial state). See docs/RELEASE.md.
          token: ${{ secrets.RELEASE_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Configure git identity
        run: |
          git config user.name "spawntree-release-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Fail early with an actionable message if any public package hasn't
      # been published yet. Automation tokens can't create new packages —
      # the workflow needs the package to exist on npm (one-time manual
      # publish) OR the NPM_TOKEN secret must be a Granular Access Token
      # with `Read and write` on `All packages`. OIDC trusted publishing
      # doesn't help for brand-new names because the per-package trusted
      # publisher config doesn't exist yet.
      - name: Check for unpublished packages
        run: |
          set -e
          missing=()
          for pkg_json in packages/*/package.json; do
            name=$(node -pe "require('./$pkg_json').name || ''")
            private=$(node -pe "require('./$pkg_json').private || false")
            if [ -z "$name" ] || [ "$private" = "true" ]; then
              continue
            fi
            if ! npm view "$name" version --silent >/dev/null 2>&1; then
              echo "::warning title=Unpublished package::\"$name\" has never been published on npm. The workflow will attempt first-publish via OIDC + NPM_TOKEN; see docs/RELEASE.md if it fails."
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            {
              echo "NEW_PACKAGES<<EOF"
              printf '%s\n' "${missing[@]}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Auto-generate changeset from conventional commits
        id: auto
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: node .github/scripts/auto-changeset.mjs

      - name: Dry-run summary (no publish)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          echo "=== Generated changeset(s) ==="
          cat .changeset/auto-*.md 2>/dev/null || echo "(none)"
          echo "=== changeset status ==="
          pnpm changeset status --verbose || true

      - name: Version, publish, and push
        # Publish only on real pushes to main. workflow_dispatch is dry-run only —
        # it never publishes (avoids publishing whatever stale commit HEAD points at).
        if: ${{ github.event_name == 'push' && steps.auto.outputs.has_changeset == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -e
          pnpm changeset version
          # Stage only `changeset version` output (bumped package.json, CHANGELOGs,
          # consumed changesets). `git add -u` stages changes to tracked files only,
          # so it never picks up untracked build artifacts; the second add catches
          # newly-created CHANGELOG files. The commit is guarded so a no-op version
          # (nothing staged) does not abort the step under `set -e`.
          git add -u
          git add packages/*/CHANGELOG.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: version packages [skip-release]"
          pnpm changeset publish
          git push --follow-tags origin HEAD:main

      # On a partial publish failure, surface what landed and what didn't
      # so the PR author can take corrective action (usually: publish the
      # new package once from a workstation with interactive 2FA, then
      # re-run the workflow). Non-fatal — the previous step already set
      # the run's conclusion.
      - name: Summarise publish outcome
        if: always()
        env:
          NEW_PACKAGES: ${{ env.NEW_PACKAGES }}
        run: |
          if [ -n "${NEW_PACKAGES:-}" ]; then
            {
              echo "## First-publish may have required elevated credentials"
              echo ""
              echo "The following packages had no prior npm presence when this run started:"
              echo ""
              echo '```'
              printf '%s\n' "$NEW_PACKAGES"
              echo '```'
              echo ""
              echo "If any of them failed with \`403 Forbidden\`, do a one-time manual publish from a workstation with interactive 2FA:"
              echo ""
              echo '```sh'
              echo 'git pull'
              echo 'cd packages/<name>'
              echo 'npm publish --access public --provenance'
              echo '```'
              echo ""
              echo "Future bumps go through this workflow automatically once the package exists on npm. See \`docs/RELEASE.md\`."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
