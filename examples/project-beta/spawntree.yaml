# Project Beta — 5-runtime monorepo
# Node.js Gateway + Bun Studio + Deno Amazon + Postgres (pg_cron+pgvector) + Redis
#
# Prerequisites:
#   mise install  (node 24, bun 1.3, deno 2.5)
#   Docker running (for Postgres, Redis)
#   pnpm env:init --profile dev  (resolves secrets from 1Password)
#
# Requires spawntree v0.1.1+ for type:postgres, type:redis

services:
  db:
    type: postgres
    environment:
      POSTGRES_DB: engine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test

  redis:
    type: redis

  gateway:
    type: process
    command: pnpm exec next dev --hostname 0.0.0.0 --port ${PORT}
    port: 3000
    depends_on:
      - db
      - redis
    healthcheck:
      url: http://localhost:${PORT}/health
      timeout: 30
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}

  studio:
    type: process
    command: bun run dev:raw --port ${PORT}
    port: 3001
    depends_on:
      - gateway
    environment:
      NODE_ENV: development
      GRAPHQL_URL: http://localhost:${GATEWAY_PORT}/graphql
      GATEWAY_API_URL: ${GATEWAY_URL}

